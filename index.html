<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Human Slider Verification</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#111827;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:420px;
    background:#1f2937;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,.5);
}

.title{
    text-align:center;
    margin-bottom:25px;
    font-size:24px;
    font-weight:bold;
}

.slider-box{
    position:relative;
    width:100%;
    height:70px;
    background:#374151;
    border-radius:50px;
    overflow:hidden;
    user-select:none;
}

.slider-fill{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0;
    background:linear-gradient(
        90deg,
        #22c55e,
        #16a34a
    );
    transition:width .03s linear;
}

.slider-text{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:18px;
    color:#d1d5db;
    z-index:2;
    pointer-events:none;
}

.slider-btn{
    position:absolute;
    top:5px;
    left:5px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:white;
    z-index:3;
    cursor:pointer;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:26px;
    font-weight:bold;
    color:#111827;

    transition:
        background .2s,
        transform .1s;
}

.slider-btn:active{
    transform:scale(.95);
}

.success{
    margin-top:20px;
    text-align:center;
    color:#22c55e;
    font-size:20px;
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <div class="title">
        Human Verification
    </div>

    <div class="slider-box" id="sliderBox">

        <div
            class="slider-fill"
            id="sliderFill"
        ></div>

        <div
            class="slider-text"
            id="sliderText"
        >
            Slide To Verify
        </div>

        <div
            class="slider-btn"
            id="sliderBtn"
        >
            »
        </div>

    </div>

    <div
        class="success"
        id="successMsg"
    >
        Verified Successfully ✅
    </div>

</div>

<script>

// =======================================
// ELEMENTS
// =======================================

const sliderBtn =
    document.getElementById("sliderBtn");

const sliderBox =
    document.getElementById("sliderBox");

const sliderFill =
    document.getElementById("sliderFill");

const sliderText =
    document.getElementById("sliderText");

const successMsg =
    document.getElementById("successMsg");

// =======================================
// VARIABLES
// =======================================

let isDragging = false;
let startX = 0;
let currentX = 0;

const maxMove =
    sliderBox.offsetWidth -
    sliderBtn.offsetWidth - 10;

// =======================================
// SOUND FUNCTION
// =======================================

function playSound() {

    const audioContext =
        new (
            window.AudioContext ||
            window.webkitAudioContext
        )();

    const oscillator =
        audioContext.createOscillator();

    const gainNode =
        audioContext.createGain();

    oscillator.type = "sine";

    oscillator.frequency.value = 220;

    oscillator.connect(gainNode);

    gainNode.connect(
        audioContext.destination
    );

    gainNode.gain.setValueAtTime(
        0.1,
        audioContext.currentTime
    );

    oscillator.start();

    oscillator.stop(
        audioContext.currentTime + 0.5
    );
}

// =======================================
// VIBRATION FUNCTION
// =======================================

function vibratePhone() {

    if ("vibrate" in navigator) {

        // vibrate for 1 second
        navigator.vibrate(1000);

        console.log(
            "Vibration Triggered"
        );

    } else {

        console.log(
            "Vibration Not Supported"
        );
    }
}

// =======================================
// START DRAG
// =======================================

sliderBtn.addEventListener(
    "mousedown",
    startDrag
);

sliderBtn.addEventListener(
    "touchstart",
    startDrag
);

function startDrag(e){

    isDragging = true;

    startX =
        e.type.includes("mouse")
        ? e.clientX
        : e.touches[0].clientX;

    // slight vibration on touch
    if ("vibrate" in navigator) {
        navigator.vibrate(50);
    }
}

// =======================================
// MOVE DRAG
// =======================================

document.addEventListener(
    "mousemove",
    moveDrag
);

document.addEventListener(
    "touchmove",
    moveDrag
);

function moveDrag(e){

    if(!isDragging) return;

    const clientX =
        e.type.includes("mouse")
        ? e.clientX
        : e.touches[0].clientX;

    currentX =
        clientX - startX;

    // ==========================
    // LIMITS
    // ==========================

    if(currentX < 0){
        currentX = 0;
    }

    if(currentX > maxMove){
        currentX = maxMove;
    }

    // ==========================
    // UPDATE UI
    // ==========================

    sliderBtn.style.left =
        currentX + "px";

    sliderFill.style.width =
        (currentX + 60) + "px";

    // ==========================
    // CONTINUOUS SMALL VIBRATION
    // ==========================

    if ("vibrate" in navigator) {

        navigator.vibrate(10);
    }

    // ==========================
    // SUCCESS
    // ==========================

    if(currentX >= maxMove){

        isDragging = false;

        sliderText.innerHTML =
            "Verified";

        successMsg.style.display =
            "block";

        sliderBtn.style.background =
            "#22c55e";

        // success vibration
        vibratePhone();

        // sound
        playSound();
    }
}

// =======================================
// END DRAG
// =======================================

document.addEventListener(
    "mouseup",
    endDrag
);

document.addEventListener(
    "touchend",
    endDrag
);

function endDrag(){

    if(!isDragging) return;

    isDragging = false;

    // reset if incomplete

    if(currentX < maxMove){

        sliderBtn.style.left =
            "5px";

        sliderFill.style.width =
            "0px";

        currentX = 0;
    }
}

</script>

</body>
</html>
