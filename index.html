<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slider Verify</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111827;
    font-family:Arial;
}

.wrapper{
    width:400px;
    padding:30px;
    background:#1f2937;
    border-radius:20px;
}

.slider{
    position:relative;
    height:70px;
    background:#374151;
    border-radius:50px;
    overflow:hidden;
}

.fill{
    position:absolute;
    left:0;
    top:0;
    height:100%;
    width:0;
    background:#22c55e;
}

.text{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    z-index:2;
    pointer-events:none;
}

.btn{
    position:absolute;
    top:5px;
    left:5px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:white;
    z-index:3;
    cursor:pointer;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;
    font-weight:bold;
}

.success{
    color:#22c55e;
    margin-top:20px;
    text-align:center;
    display:none;
}

</style>
</head>

<body>

<div class="wrapper">

    <div class="slider" id="slider">

        <div class="fill" id="fill"></div>

        <div class="text" id="text">
            Slide To Verify
        </div>

        <div class="btn" id="btn">
            »
        </div>

    </div>

    <div class="success" id="success">
        Verified Successfully ✅
    </div>

</div>

<script>

// =====================================
// ELEMENTS
// =====================================

const slider =
    document.getElementById("slider");

const btn =
    document.getElementById("btn");

const fill =
    document.getElementById("fill");

const text =
    document.getElementById("text");

const success =
    document.getElementById("success");

// =====================================
// AUDIO SETUP
// =====================================

let audioContext = null;

function initAudio(){

    if(!audioContext){

        audioContext =
            new (
                window.AudioContext ||
                window.webkitAudioContext
            )();
    }

    if(audioContext.state === "suspended"){

        audioContext.resume();
    }
}

function playBeep(){

    if(!audioContext) return;

    const oscillator =
        audioContext.createOscillator();

    const gainNode =
        audioContext.createGain();

    oscillator.type = "sine";

    oscillator.frequency.value = 500;

    gainNode.gain.value = 0.1;

    oscillator.connect(gainNode);

    gainNode.connect(
        audioContext.destination
    );

    oscillator.start();

    oscillator.stop(
        audioContext.currentTime + 0.5
    );
}

// =====================================
// VIBRATE
// =====================================

function vibrate(ms = 1000){

    if(
        navigator.vibrate
    ){

        navigator.vibrate(ms);

        console.log(
            "vibrate:",
            ms
        );

    }else{

        console.log(
            "vibration unsupported"
        );
    }
}

// =====================================
// DRAG
// =====================================

let dragging = false;
let startX = 0;
let currentX = 0;

const maxMove =
    slider.offsetWidth -
    btn.offsetWidth - 10;

// =====================================
// START
// =====================================

function startDrag(e){

    dragging = true;

    initAudio();

    vibrate(100);

    startX =
        e.type.includes("mouse")
        ? e.clientX
        : e.touches[0].clientX;
}

btn.addEventListener(
    "mousedown",
    startDrag
);

btn.addEventListener(
    "touchstart",
    startDrag
);

// =====================================
// MOVE
// =====================================

function moveDrag(e){

    if(!dragging) return;

    const clientX =
        e.type.includes("mouse")
        ? e.clientX
        : e.touches[0].clientX;

    currentX =
        clientX - startX;

    if(currentX < 0){
        currentX = 0;
    }

    if(currentX > maxMove){
        currentX = maxMove;
    }

    btn.style.left =
        currentX + "px";

    fill.style.width =
        (currentX + 60) + "px";

    // =================================
    // SUCCESS
    // =================================

    if(currentX >= maxMove){

        dragging = false;

        text.innerHTML =
            "Verified";

        success.style.display =
            "block";

        btn.style.background =
            "#22c55e";

        // IMPORTANT:
        // vibration only on success

        vibrate(1000);

        playBeep();
    }
}

document.addEventListener(
    "mousemove",
    moveDrag
);

document.addEventListener(
    "touchmove",
    moveDrag
);

// =====================================
// END
// =====================================

function endDrag(){

    if(!dragging) return;

    dragging = false;

    if(currentX < maxMove){

        btn.style.left =
            "5px";

        fill.style.width =
            "0px";

        currentX = 0;
    }
}

document.addEventListener(
    "mouseup",
    endDrag
);

document.addEventListener(
    "touchend",
    endDrag
);

</script>

</body>
</html>
