<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Human Slider Check</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#111827;
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
    }

    .container{
        width:420px;
        background:#1f2937;
        padding:30px;
        border-radius:20px;
        box-shadow:0 0 30px rgba(0,0,0,.4);
    }

    h2{
        margin-bottom:25px;
        text-align:center;
    }

    .slider-box{
        position:relative;
        width:100%;
        height:70px;
        background:#374151;
        border-radius:50px;
        overflow:hidden;
        user-select:none;
    }

    .slider-fill{
        position:absolute;
        left:0;
        top:0;
        height:100%;
        width:0;
        background:linear-gradient(90deg,#22c55e,#16a34a);
        transition:width .05s linear;
    }

    .slider-text{
        position:absolute;
        width:100%;
        height:100%;
        display:flex;
        justify-content:center;
        align-items:center;
        color:#d1d5db;
        font-size:18px;
        pointer-events:none;
        z-index:2;
    }

    .slider-btn{
        position:absolute;
        top:5px;
        left:5px;
        width:60px;
        height:60px;
        border-radius:50%;
        background:white;
        cursor:pointer;
        z-index:3;
        display:flex;
        justify-content:center;
        align-items:center;
        font-size:24px;
        font-weight:bold;
        color:#111827;
        transition:background .2s;
    }

    .success{
        margin-top:20px;
        text-align:center;
        color:#22c55e;
        font-size:20px;
        display:none;
    }
</style>
</head>

<body>

<div class="container">

    <h2>Human Verification Slider</h2>

    <div class="slider-box" id="sliderBox">

        <div class="slider-fill" id="sliderFill"></div>

        <div class="slider-text" id="sliderText">
            Slide to Verify
        </div>

        <div class="slider-btn" id="sliderBtn">
            »
        </div>

    </div>

    <div class="success" id="successMsg">
        Verified Successfully ✅
    </div>

</div>

<script>

const sliderBtn = document.getElementById("sliderBtn");
const sliderBox = document.getElementById("sliderBox");
const sliderFill = document.getElementById("sliderFill");
const sliderText = document.getElementById("sliderText");
const successMsg = document.getElementById("successMsg");

let isDragging = false;
let startX = 0;
let currentX = 0;

const maxMove =
    sliderBox.offsetWidth -
    sliderBtn.offsetWidth - 10;

// ============================
// SOUND
// ============================

function playBeep() {

    const audioCtx =
        new (window.AudioContext ||
        window.webkitAudioContext)();

    const oscillator =
        audioCtx.createOscillator();

    const gainNode =
        audioCtx.createGain();

    oscillator.type = "sine";
    oscillator.frequency.value = 220;

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.start();

    gainNode.gain.setValueAtTime(
        0.1,
        audioCtx.currentTime
    );

    oscillator.stop(
        audioCtx.currentTime + 0.5
    );
}

// ============================
// VIBRATE
// ============================

function vibratePhone() {

    if (navigator.vibrate) {
        navigator.vibrate(500);
    }
}

// ============================
// START DRAG
// ============================

sliderBtn.addEventListener("mousedown", startDrag);
sliderBtn.addEventListener("touchstart", startDrag);

function startDrag(e){

    isDragging = true;

    startX =
        e.type.includes("mouse")
        ? e.clientX
        : e.touches[0].clientX;
}

// ============================
// MOVE
// ============================

document.addEventListener("mousemove", moveDrag);
document.addEventListener("touchmove", moveDrag);

function moveDrag(e){

    if(!isDragging) return;

    const clientX =
        e.type.includes("mouse")
        ? e.clientX
        : e.touches[0].clientX;

    currentX = clientX - startX;

    if(currentX < 0){
        currentX = 0;
    }

    if(currentX > maxMove){
        currentX = maxMove;
    }

    sliderBtn.style.left =
        currentX + "px";

    sliderFill.style.width =
        (currentX + 60) + "px";

    // ============================
    // SUCCESS
    // ============================

    if(currentX >= maxMove){

        isDragging = false;

        sliderText.innerHTML =
            "Verified";

        successMsg.style.display =
            "block";

        sliderBtn.style.background =
            "#22c55e";

        playBeep();

        vibratePhone();
    }
}

// ============================
// END DRAG
// ============================

document.addEventListener("mouseup", endDrag);
document.addEventListener("touchend", endDrag);

function endDrag(){

    if(!isDragging) return;

    isDragging = false;

    // reset if not completed

    if(currentX < maxMove){

        sliderBtn.style.left = "5px";

        sliderFill.style.width = "0px";

        currentX = 0;
    }
}

</script>

</body>
</html>
