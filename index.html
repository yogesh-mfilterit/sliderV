<script>

function vibratePhone() {

    // vibrate 1 second
    if ("vibrate" in navigator) {

        // single vibration
        navigator.vibrate(1000);

        // OR pattern:
        // navigator.vibrate([500, 200, 500]);

        console.log("Vibration triggered");

    } else {

        console.log("Vibration not supported");
    }
}

document.addEventListener("click", () => {

    vibratePhone();

});

</script>
